name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Lint agent
        run: cd agent && go vet ./...

      - name: Lint sidecar
        run: cd sidecar && go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Test agent
        run: cd agent && go test -race -coverprofile=coverage-agent.out -v ./...

      - name: Test sidecar
        run: cd sidecar && go test -race -coverprofile=coverage-sidecar.out -v ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            agent/coverage-agent.out
            sidecar/coverage-sidecar.out

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build agent
        run: cd agent && go build -o ../bin/agent ./cmd/agent

      - name: Build sidecar
        run: cd sidecar && go build -o ../bin/sidecar ./cmd/sidecar

  docker:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push agent image
        uses: docker/build-push-action@v6
        with:
          context: ./agent
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/agent:latest
            ghcr.io/${{ github.repository }}/agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push sidecar image
        uses: docker/build-push-action@v6
        with:
          context: ./sidecar
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/sidecar:latest
            ghcr.io/${{ github.repository }}/sidecar:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
