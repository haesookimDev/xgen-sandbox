apiVersion: v1
kind: ServiceAccount
metadata:
  name: xgen-agent
  namespace: xgen-system
---
# Namespace-scoped Role — agent only needs access to sandbox pods in the sandbox namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: xgen-agent
  namespace: {{ .Values.sandbox.namespace }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: xgen-agent
  namespace: {{ .Values.sandbox.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: xgen-agent
subjects:
  - kind: ServiceAccount
    name: xgen-agent
    namespace: xgen-system
