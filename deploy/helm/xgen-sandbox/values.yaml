agent:
  image:
    repository: ghcr.io/xgen-sandbox/agent
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    type: ClusterIP
    port: 8080
    nodePort: 30080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  env:
    SANDBOX_NAMESPACE: xgen-sandboxes
    PREVIEW_DOMAIN: preview.localhost:8080
  secrets:
    # REQUIRED: Override these in your values-production.yaml or via --set
    apiKey: ""
    jwtSecret: ""

sidecar:
  image:
    repository: ghcr.io/xgen-sandbox/sidecar
    tag: latest

runtime:
  baseImage: ghcr.io/xgen-sandbox/runtime-base:latest

sandbox:
  imagePullPolicy: ""
  namespace: xgen-sandboxes
  defaultTimeout: 1h
  maxTimeout: 24h
  warmPoolSize: 0
  resourceQuota:
    pods: "50"
    requestsCpu: "25"
    requestsMemory: "25Gi"
    limitsCpu: "50"
    limitsMemory: "50Gi"

ingress:
  enabled: false
  className: traefik
  host: agent.example.com
  previewDomain: preview.example.com
  tls: false
  clusterIssuer: letsencrypt-prod

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilization: 70

podDisruptionBudget:
  enabled: false
  minAvailable: 1

monitoring:
  serviceMonitor:
    enabled: false
    interval: 15s
    scrapeTimeout: 10s
    labels: {}
  prometheusRule:
    enabled: false
    labels: {}
    rules:
      highActiveSandboxes: 40
      highErrorRatePercent: 5
      highLatencySeconds: 5
  grafana:
    enabled: false
    dashboardLabel: grafana_dashboard
    dashboardLabelValue: "1"

dashboard:
  enabled: false
  image:
    repository: ghcr.io/xgen-sandbox/dashboard
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    type: ClusterIP
    port: 3000
  env:
    AGENT_URL: "http://xgen-agent.xgen-system:8080"
